name: Refresh stats and deploy

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate stats and years manifest
        run: npm run generate:stats

      - name: Commit updated data files
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh World Cup stats cache"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: refresh
    if: needs.refresh.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
